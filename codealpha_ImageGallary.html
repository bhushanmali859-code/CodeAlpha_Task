<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e10;
    --surface: #18181b;
    --border: rgba(255,255,255,0.08);
    --accent: #c8a96e;
    --accent-dim: rgba(200,169,110,0.15);
    --text: #f0ece4;
    --muted: #6b6762;
    --radius: 12px;
    --transition: 0.35s cubic-bezier(0.4,0,0.2,1);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    padding: 3rem 2rem 0;
    max-width: 1300px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
  }
  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
  }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2.2rem, 5vw, 4rem);
    font-weight: 400;
    line-height: 1.05;
    color: var(--text);
  }
  header h1 em { font-style: italic; color: var(--accent); }

  /* ── TOOLBAR ── */
  .toolbar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
    padding: 2rem 2rem 1.5rem;
    max-width: 1300px;
    margin: 0 auto;
  }
  .toolbar-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-right: 4px;
  }
  .filter-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 400;
    padding: 7px 18px;
    border: 1px solid var(--border);
    border-radius: 100px;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all var(--transition);
    letter-spacing: 0.04em;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #0e0e10; font-weight: 500; }

  /* ── GRID ── */
  .gallery-wrap {
    max-width: 1300px;
    margin: 0 auto;
    padding: 0 2rem 4rem;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
  }

  /* ── CARD ── */
  .card {
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
    cursor: pointer;
    background: var(--surface);
    transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
    opacity: 1;
    animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card:hover { transform: translateY(-6px) scale(1.01); border-color: var(--accent); box-shadow: 0 16px 40px rgba(0,0,0,0.4); }
  .card.hidden { display: none; }

  .thumb-wrap { position: relative; overflow: hidden; aspect-ratio: 4/3; }
  .thumb {
    width: 100%; height: 100%;
    display: block; object-fit: cover;
    transition: transform 0.5s ease;
  }
  .card:hover .thumb { transform: scale(1.07); }

  .thumb-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(14,14,16,0.85) 0%, transparent 60%);
    opacity: 0;
    transition: opacity var(--transition);
    display: flex; align-items: flex-end; padding: 14px;
  }
  .card:hover .thumb-overlay { opacity: 1; }
  .overlay-icon {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--accent); color: #0e0e10;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; margin-left: auto;
  }

  .card-body { padding: 12px 14px 14px; }
  .card-title { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-meta { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
  .tag {
    font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 3px 9px; border-radius: 100px;
  }
  .tag-nature  { background: rgba(134,187,88,0.15); color: #86bb58; }
  .tag-city    { background: rgba(88,152,210,0.15); color: #5898d2; }
  .tag-abstract{ background: rgba(163,110,210,0.15); color: #a36ed2; }
  .tag-people  { background: rgba(210,130,88,0.15); color: #d28258; }
  .card-num { font-size: 11px; color: var(--muted); margin-left: auto; }

  /* ── EMPTY STATE ── */
  .empty { display: none; text-align: center; padding: 4rem 2rem; color: var(--muted); }
  .empty.show { display: block; }
  .empty p { font-size: 15px; margin-top: 0.5rem; }

  /* ── LIGHTBOX ── */
  #lb {
    display: none; position: fixed; inset: 0; z-index: 9999;
    background: rgba(8,8,9,0.95);
    align-items: center; justify-content: center; flex-direction: column;
    backdrop-filter: blur(8px);
  }
  #lb.open { display: flex; }

  .lb-close {
    position: fixed; top: 20px; right: 24px;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 50%; width: 44px; height: 44px; color: #fff; font-size: 20px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background var(--transition); z-index: 10000;
  }
  .lb-close:hover { background: rgba(255,255,255,0.18); }

  .lb-stage {
    position: relative; width: min(760px, 90vw);
    display: flex; flex-direction: column; align-items: center;
  }
  .lb-img {
    width: 100%; max-height: 68vh; object-fit: contain;
    border-radius: var(--radius);
    animation: lbIn 0.25s ease;
  }
  @keyframes lbIn {
    from { opacity: 0; transform: scale(0.97); }
    to   { opacity: 1; transform: scale(1); }
  }

  .lb-info {
    margin-top: 18px; text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .lb-title { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--text); }
  .lb-sub { font-size: 12px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

  .lb-nav {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 50%; width: 48px; height: 48px;
    color: #fff; font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background var(--transition), border-color var(--transition);
  }
  .lb-nav:hover { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  .lb-prev { left: -68px; }
  .lb-next { right: -68px; }

  .lb-dots { display: flex; gap: 6px; margin-top: 16px; }
  .lb-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(255,255,255,0.2); cursor: pointer;
    transition: background var(--transition), transform var(--transition);
  }
  .lb-dot.active { background: var(--accent); transform: scale(1.4); }

  .lb-counter {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    font-size: 12px; letter-spacing: 0.1em; color: var(--muted);
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 640px) {
    header { padding: 2rem 1.25rem 0; }
    .toolbar { padding: 1.5rem 1.25rem 1rem; }
    .gallery-wrap { padding: 0 1.25rem 3rem; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
    .lb-prev { left: -4px; }
    .lb-next { right: -4px; }
    .lb-nav { opacity: 0.85; width: 38px; height: 38px; font-size: 16px; }
    .lb-stage { width: 94vw; }
  }
</style>
</head>
<body>

<header>
  <span class="eyebrow">Visual Collection</span>
  <h1>The <em>Gallery</em></h1>
</header>

<div class="toolbar">
  <span class="toolbar-label">Filter</span>
  <button class="filter-btn active" data-cat="all">All</button>
  <button class="filter-btn" data-cat="nature">Nature</button>
  <button class="filter-btn" data-cat="city">City</button>
  <button class="filter-btn" data-cat="abstract">Abstract</button>
  <button class="filter-btn" data-cat="people">People</button>
</div>

<div class="gallery-wrap">
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty">
    <p>No images found in this category.</p>
  </div>
</div>

<!-- Lightbox -->
<div id="lb" role="dialog" aria-modal="true" aria-label="Image lightbox">
  <button class="lb-close" id="lb-close" aria-label="Close">&#x2715;</button>
  <div class="lb-stage">
    <button class="lb-nav lb-prev" id="lb-prev" aria-label="Previous image">&#8592;</button>
    <img class="lb-img" id="lb-img" src="" alt="">
    <button class="lb-nav lb-next" id="lb-next" aria-label="Next image">&#8594;</button>
    <div class="lb-info">
      <div class="lb-title" id="lb-title"></div>
      <div class="lb-sub" id="lb-sub"></div>
    </div>
    <div class="lb-dots" id="lb-dots"></div>
  </div>
  <div class="lb-counter" id="lb-counter"></div>
</div>

<script>
/* ── DATA ──
   Replace the `src` values with real image URLs or local paths.
   SVG placeholders are used here so the gallery works out of the box.
*/
function makePlaceholder(color, emoji, label) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
    <rect width="400" height="300" fill="${color}"/>
    <text x="200" y="130" text-anchor="middle" font-size="60" font-family="sans-serif">${emoji}</text>
    <text x="200" y="190" text-anchor="middle" font-size="16" font-family="sans-serif" fill="rgba(255,255,255,0.5)">${label}</text>
  </svg>`;
  return 'data:image/svg+xml,' + encodeURIComponent(svg);
}

const images = [
  { title: 'Mountain mist',    cat: 'nature',   src: makePlaceholder('#1a3a2a','🏔','Mountain mist')    },
  { title: 'Forest at dawn',   cat: 'nature',   src: makePlaceholder('#1e3520','🌲','Forest at dawn')   },
  { title: 'Ocean horizon',    cat: 'nature',   src: makePlaceholder('#0d2a3a','🌊','Ocean horizon')    },
  { title: 'Desert dunes',     cat: 'nature',   src: makePlaceholder('#3a2a10','🏜','Desert dunes')     },
  { title: 'Downtown dusk',    cat: 'city',     src: makePlaceholder('#12152a','🌆','Downtown dusk')    },
  { title: 'Night market',     cat: 'city',     src: makePlaceholder('#1a1020','🌃','Night market')     },
  { title: 'Harbour view',     cat: 'city',     src: makePlaceholder('#0d1e30','⛵','Harbour view')     },
  { title: 'Rooftop morning',  cat: 'city',     src: makePlaceholder('#1e1a10','🏙','Rooftop morning')  },
  { title: 'Colour waves',     cat: 'abstract', src: makePlaceholder('#1a0a2a','〰','Colour waves')     },
  { title: 'Bokeh bloom',      cat: 'abstract', src: makePlaceholder('#2a0a1a','✦','Bokeh bloom')      },
  { title: 'Neon grid',        cat: 'abstract', src: makePlaceholder('#0a1a2a','⬡','Neon grid')        },
  { title: 'Light trails',     cat: 'abstract', src: makePlaceholder('#1a1a0a','◈','Light trails')     },
  { title: 'Candid smile',     cat: 'people',   src: makePlaceholder('#2a1a10','😊','Candid smile')     },
  { title: 'Portrait study',   cat: 'people',   src: makePlaceholder('#1a1018','🧑','Portrait study')   },
  { title: 'Street moment',    cat: 'people',   src: makePlaceholder('#101520','🚶','Street moment')    },
  { title: 'Golden hour',      cat: 'people',   src: makePlaceholder('#2a1a08','🌅','Golden hour')      },
];

/* ── STATE ── */
let activeFilter = 'all';
let visibleIndices = [];
let lbIdx = 0;

/* ── RENDER GRID ── */
function renderGrid(cat) {
  activeFilter = cat;
  visibleIndices = [];
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  images.forEach((img, i) => {
    if (cat !== 'all' && img.cat !== cat) return;
    visibleIndices.push(i);
  });

  document.getElementById('empty').classList.toggle('show', visibleIndices.length === 0);

  visibleIndices.forEach((imgIdx, vi) => {
    const img = images[imgIdx];
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${vi * 40}ms`;
    card.innerHTML = `
      <div class="thumb-wrap">
        <img class="thumb" src="${img.src}" alt="${img.title}" loading="lazy">
        <div class="thumb-overlay">
          <span class="overlay-icon">&#x2196;</span>
        </div>
      </div>
      <div class="card-body">
        <div class="card-title">${img.title}</div>
        <div class="card-meta">
          <span class="tag tag-${img.cat}">${img.cat}</span>
          <span class="card-num">${String(vi + 1).padStart(2,'0')}</span>
        </div>
      </div>`;
    card.addEventListener('click', () => openLightbox(vi));
    grid.appendChild(card);
  });
}

/* ── LIGHTBOX ── */
function openLightbox(vi) {
  lbIdx = vi;
  renderLightbox();
  document.getElementById('lb').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lb').classList.remove('open');
  document.body.style.overflow = '';
}

function renderLightbox() {
  const img = images[visibleIndices[lbIdx]];
  const lbImg = document.getElementById('lb-img');
  lbImg.src = img.src;
  lbImg.alt = img.title;
  // Re-trigger animation
  lbImg.style.animation = 'none';
  lbImg.offsetHeight;
  lbImg.style.animation = '';
  document.getElementById('lb-title').textContent = img.title;
  document.getElementById('lb-sub').textContent = img.cat + ' · ' + (lbIdx + 1) + ' of ' + visibleIndices.length;
  document.getElementById('lb-counter').textContent = `${lbIdx + 1} / ${visibleIndices.length}`;

  const dots = document.getElementById('lb-dots');
  dots.innerHTML = '';
  visibleIndices.forEach((_, i) => {
    const d = document.createElement('span');
    d.className = 'lb-dot' + (i === lbIdx ? ' active' : '');
    d.addEventListener('click', () => { lbIdx = i; renderLightbox(); });
    dots.appendChild(d);
  });
}

function navigate(dir) {
  lbIdx = (lbIdx + dir + visibleIndices.length) % visibleIndices.length;
  renderLightbox();
}

/* ── EVENTS ── */
document.getElementById('lb-close').addEventListener('click', closeLightbox);
document.getElementById('lb-prev').addEventListener('click', () => navigate(-1));
document.getElementById('lb-next').addEventListener('click', () => navigate(1));

document.getElementById('lb').addEventListener('click', e => {
  if (e.target === document.getElementById('lb')) closeLightbox();
});

document.addEventListener('keydown', e => {
  if (!document.getElementById('lb').classList.contains('open')) return;
  if (e.key === 'ArrowRight') navigate(1);
  if (e.key === 'ArrowLeft')  navigate(-1);
  if (e.key === 'Escape')     closeLightbox();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid(btn.dataset.cat);
  });
});

/* ── TOUCH SWIPE ── */
let touchStartX = 0;
document.getElementById('lb').addEventListener('touchstart', e => {
  touchStartX = e.changedTouches[0].screenX;
}, { passive: true });
document.getElementById('lb').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].screenX - touchStartX;
  if (Math.abs(dx) > 50) navigate(dx < 0 ? 1 : -1);
});

/* ── INIT ── */
renderGrid('all');
</script>
</body>
</html>
